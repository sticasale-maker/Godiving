<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sydney Marine Arcade</title>
<style>
  :root{
    --bg:#06222e; --bg2:#0c3142; --surface:#0f3c50; --line:rgba(255,255,255,0.14);
    --text:#eaf6fb; --muted:#9fc3d2; --accent:#36c9c0; --accentd:#0d3b3a;
    --coral:#ef7a52; --gold:#f3c64f; --good:#4fd28a; --goodd:#0e3d28; --bad:#ef6b6b; --badd:#3d1414;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%, #0b3a4d, #06222e 60%);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased; min-height:100vh}
  .wrap{max-width:860px;margin:0 auto;padding:28px 18px 60px}
  h1{font-size:26px;font-weight:600;margin:0 0 4px;letter-spacing:.2px}
  .sub{color:var(--muted);margin:0 0 22px;font-size:15px}
  .nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
  .nav button{background:var(--surface);color:var(--text);border:1px solid var(--line);border-radius:10px;
    padding:9px 14px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s}
  .nav button:hover{border-color:var(--accent)}
  .nav button.on{background:var(--accent);color:#04282a;border-color:var(--accent);font-weight:600}
  .panel{display:none;animation:fade .25s ease}
  .panel.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .head p{margin:0;color:var(--muted);font-size:15px}
  .score{font-size:15px;color:var(--muted)}
  .score b{color:var(--text)}
  .sea{background:linear-gradient(#bfe3ef,#8ec6dc);border-radius:14px;padding:10px;border:1px solid var(--line)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  button.opt{display:block;width:100%;text-align:left;margin:8px 0;background:var(--bg2);color:var(--text);
    border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:15px;cursor:pointer;transition:.12s}
  button.opt:hover:not(:disabled){border-color:var(--accent)}
  button.opt:disabled{cursor:default;opacity:.95}
  .right{background:var(--goodd)!important;border-color:var(--good)!important;color:#cdf3df!important}
  .wrong{background:var(--badd)!important;border-color:var(--bad)!important;color:#f7cfcf!important}
  .btn{background:var(--accent);color:#04282a;border:none;border-radius:10px;padding:10px 16px;font-size:15px;
    font-weight:600;cursor:pointer;margin-top:10px}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);font-weight:500}
  .fact{font-size:14.5px;color:var(--muted);min-height:22px;margin:10px 0 0}
  .grid2{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:14px;align-items:start}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  .tag{display:inline-block;background:var(--accentd);color:var(--accent);font-size:12.5px;padding:4px 10px;
    border-radius:8px;margin:0 5px 5px 0}
  .bar{height:10px;border-radius:999px;background:var(--bg2);overflow:hidden;margin-bottom:14px;border:1px solid var(--line)}
  .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border:1px solid var(--line);
    border-radius:10px;margin:7px 0;background:var(--bg2)}
  .row .nm{display:flex;align-items:center;gap:11px;font-size:15px}
  .row .thumb{width:46px;flex:0 0 46px}
  .row button{background:var(--surface);color:var(--text);border:1px solid var(--line);border-radius:9px;
    padding:7px 12px;font-size:13.5px;cursor:pointer;min-width:118px}
  .spotted{background:var(--goodd)!important;border-color:var(--good)!important;color:#cdf3df!important}
  .logsceneimg{width:100%;border-radius:14px;border:1px solid var(--line);display:block;object-fit:cover;max-height:300px}
  .chip{padding:10px 16px;border-radius:10px;border:1.5px solid var(--line);background:var(--bg2);color:var(--text);font-size:15px;cursor:pointer;transition:.15s;font-family:inherit}
  .chip:hover:not(.chip-done):not(.chip-wrong){border-color:var(--accent)}
  .chip-done{background:var(--goodd);border-color:var(--good);color:#cdf3df;cursor:default}
  .chip-wrong{background:var(--badd);border-color:var(--bad);color:#ffd0d0;cursor:default}
  .live{display:inline-flex;align-items:center;gap:6px;background:var(--badd);color:#ffb4b4;font-size:12.5px;
    padding:4px 11px;border-radius:8px}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--bad);animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.3}}
  .tcards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tcard{border:1px solid var(--line);border-radius:14px;padding:10px;background:var(--surface)}
  .tcard .tt{text-align:center;font-weight:600;margin:2px 0 6px;font-size:15px}
  .tcard .cap{text-align:center;font-size:12.5px;color:var(--muted);margin:0 0 6px}
  .statbtn{display:flex;justify-content:space-between;width:100%;margin:6px 0;background:var(--bg2);color:var(--text);
    border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:13.5px;cursor:pointer}
  .statbtn:hover:not(:disabled){border-color:var(--accent)}
  .statbtn.locked{opacity:.35;cursor:not-allowed}
  .statbtn .note{font-size:11px;color:var(--muted);margin-left:6px;font-weight:400}
  .statrow{display:flex;justify-content:space-between;margin:6px 0;background:var(--bg2);border:1px solid var(--line);
    border-radius:9px;padding:8px 11px;font-size:13.5px}
  .tres{text-align:center;font-size:16px;font-weight:600;min-height:24px;margin:12px 0 4px}
  svg{display:block}
</style>
</head>
<body>
<div class="wrap">
  <h1>🌊 Sydney Marine Arcade</h1>
  <p class="sub">Four quick games for all ages — guess the creature, log your spots, and battle stats.</p>

  <div class="nav" id="nav">
    <button data-p="quiz" class="on">🐠 Guess who</button>
    <button data-p="log">✅ Spotter log</button>
    <button data-p="guess">🔎 Where am I?</button>
    <button data-p="trumps">🃏 Stat battle</button>
  </div>

  <!-- QUIZ -->
  <div class="panel show" id="p-quiz">
    <div class="head"><p>Name the creature</p><span class="score">Score <b id="qscore">0</b> / <b id="qtotal">0</b></span></div>
    <div id="qart" style="border-radius:14px;overflow:hidden;"></div>
    <div id="qopts" style="margin-top:12px"></div>
    <p class="fact" id="qfact"></p>
    <button class="btn" id="qnext" style="display:none">Next creature →</button>
  </div>

  <!-- LOG -->
  <div class="panel" id="p-log">
    <div class="head"><p>What can you spot in this scene?</p><span class="score"><b id="logn">0</b> / 3 found</span></div>
    <div class="bar"><i id="logbar"></i></div>
    <div id="logscene"></div>
    <div id="logchips" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px"></div>
    <p class="fact" id="logmsg"></p>
  </div>

  <!-- GUESS -->
  <div class="panel" id="p-guess">
    <div class="head"><p>Which Sydney dive site is this?</p><span class="score">Score <b id="gscore">0</b> / <b id="gtotal">0</b></span></div>
    <div id="gart"></div>
    <div id="gopts" style="margin-top:12px"></div>
    <button class="btn" id="gnext" style="display:none">Next location →</button>
  </div>

  <!-- TRUMPS -->
  <div class="panel" id="p-trumps">
    <div class="head"><p>Pick a stat — highest value wins the round</p></div>
    <div class="tcards"><div class="tcard" id="pcard"></div><div class="tcard" id="ccard"></div></div>
    <p class="tres" id="tresult"></p>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
      <span class="score">You <b id="twin">0</b> · Reef <b id="tlose">0</b></span>
      <button class="btn ghost" id="tdeal" style="display:none">Deal again</button>
    </div>
  </div>
</div>

<script>
var PHOTOS={
 seadragon:{src:'images/weedy.png',       alt:'Weedy seadragon'},
 pjshark:  {src:'images/portjackson.png', alt:'Port Jackson shark'},
 groper:   {src:'images/groper.png',      alt:'Eastern blue groper'},
 cuttle:   {src:'images/cuttle.png',      alt:'Giant cuttlefish'},
 bluedevil:{src:'images/bluedevil.webp',  alt:'Eastern blue devil'}
};
function ART_html(key,h){
 h=h||190;
 var ph=PHOTOS[key];
 return '<div style="border-radius:10px;overflow:hidden;height:'+h+'px;background:#071e29;display:flex;align-items:center;justify-content:center">'
  +'<img src="'+ph.src+'" alt="'+ph.alt+'" style="width:100%;height:100%;object-fit:contain;display:block" loading="lazy"'
  +' onerror="this.outerHTML=ART[this.dataset.k]()" data-k="'+key+'">'
  +'</div>';
}
var ART={
 seadragon:function(){return ART_html('seadragon');},
 pjshark:function(){return ART_html('pjshark');},
 groper:function(){return ART_html('groper');},
 cuttle:function(){return ART_html('cuttle');},
 bluedevil:function(){return ART_html('bluedevil');}
};

/* Photo-based scenes for Where am I? */
var PHOTO_SCENES=[
 {img:'images/chowder.jpg', name:'Chowder Bay'},
 {img:'images/ctb.jpg',     name:'Cabbage Tree Bay'}
];

/* All possible answer options for Where am I? */
var ALL_SITES=[
 'Cabbage Tree Bay','Chowder Bay','Gordons Bay',
 'Bare Island','Kurnell','Oak Park','Freshwater','North Bondi','Little Bay'
];

var CR={
 seadragon:{n:'Weedy seadragon',len:45,depth:50,speed:0.15,life:6,eggs:275,camo:9,f:'A NSW icon — the male carries the eggs along his tail.'},
 pjshark:{n:'Port Jackson shark',len:165,depth:275,speed:1.5,life:30,eggs:13,camo:5,f:'A harmless bottom-dweller that lays spiral, screw-shaped egg cases.'},
 groper:{n:'Eastern blue groper',len:100,depth:60,speed:4,life:35,eggs:50000,camo:2,f:'The NSW state fish. The big blue males all start life as females.'},
 cuttle:{n:'Giant cuttlefish',len:100,depth:100,speed:10,life:2,eggs:200,camo:10,f:'The world’s largest cuttlefish and a master colour-changer.'},
 bluedevil:{n:'Eastern blue devil',len:40,depth:30,speed:2,life:12,eggs:500,camo:4,f:'A shy, cave-loving fish found only along the NSW coast.'}
};
var KEYS=Object.keys(CR);
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
var $=function(id){return document.getElementById(id);};

var nav=$('nav');
nav.querySelectorAll('button').forEach(function(b){b.onclick=function(){
 nav.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
 b.classList.add('on');
 document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('show');});
 $('p-'+b.dataset.p).classList.add('show');
};});

/* QUIZ */
var qScore=0,qTotal=0;
function quizRound(){
 $('qfact').textContent='';$('qnext').style.display='none';
 var key=KEYS[Math.floor(Math.random()*KEYS.length)];
 $('qart').innerHTML=ART_html(key,260);
 var opts=shuffle([key].concat(shuffle(KEYS.filter(function(k){return k!==key;})).slice(0,3)));
 $('qopts').innerHTML=opts.map(function(k){return '<button class="opt" data-k="'+k+'">'+CR[k].n+'</button>';}).join('');
 $('qopts').querySelectorAll('.opt').forEach(function(btn){btn.onclick=function(){
  qTotal++;
  $('qopts').querySelectorAll('.opt').forEach(function(x){x.disabled=true;if(x.dataset.k===key)x.classList.add('right');});
  if(btn.dataset.k===key)qScore++;else btn.classList.add('wrong');
  $('qscore').textContent=qScore;$('qtotal').textContent=qTotal;
  $('qfact').textContent=CR[key].f;$('qnext').style.display='inline-block';
 };});
}
$('qnext').onclick=quizRound;quizRound();

/* LOG */
var LOG_ANSWERS=['Port Jackson shark','Eastern blue groper','Weedy seadragon'];
var logFound={};
function renderLog(){
 var n=Object.keys(logFound).length;
 $('logn').textContent=n;
 $('logbar').style.width=(n/3*100)+'%';
 if(n===3){$('logmsg').textContent='Nice eye — you spotted all three! 🏆';}
 else{$('logmsg').textContent='';}
}
$('logscene').innerHTML='<img src="images/spotter1.png" alt="Underwater scene — spot the species" class="logsceneimg" loading="lazy">';
$('logchips').innerHTML=LOG_ANSWERS.map(function(sp){
 return '<button class="chip" data-sp="'+sp+'">'+sp+'</button>';
}).join('');
$('logchips').querySelectorAll('.chip').forEach(function(b){
 b.onclick=function(){
  if(b.classList.contains('chip-done'))return;
  logFound[b.dataset.sp]=true;
  b.classList.add('chip-done');
  b.textContent=b.dataset.sp+' ✓';
  renderLog();
 };
});
renderLog();

/* GUESS */
var gScore=0,gTotal=0;
var gUsed=[];
function guessRound(){
 $('gnext').style.display='none';
 /* Pick a scene not recently used — cycle through photo scenes first, then SVG */
 if(gUsed.length>=PHOTO_SCENES.length) gUsed=[];
 var available=PHOTO_SCENES.filter(function(s,i){return gUsed.indexOf(i)<0;});
 var pick=available[Math.floor(Math.random()*available.length)];
 var pickIdx=PHOTO_SCENES.indexOf(pick);
 gUsed.push(pickIdx);
 var correctName=pick.name;
 /* Build 4 options: correct + 3 random wrong from ALL_SITES */
 var wrong=shuffle(ALL_SITES.filter(function(n){return n!==correctName;})).slice(0,3);
 var opts=shuffle([correctName].concat(wrong));
 $('gart').innerHTML='<div style="border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-bottom:2px">'+
  '<img src="'+pick.img+'" alt="Underwater photo — guess the site" style="width:100%;display:block;max-height:280px;object-fit:cover;border-radius:14px" loading="lazy">'+
  '</div>';
 $('gopts').innerHTML=opts.map(function(n){
  return '<button class="opt" data-n="'+n+'">'+n+'</button>';
 }).join('');
 $('gopts').querySelectorAll('.opt').forEach(function(btn){btn.onclick=function(){
  gTotal++;
  $('gopts').querySelectorAll('.opt').forEach(function(x){
   x.disabled=true;
   if(x.dataset.n===correctName)x.classList.add('right');
  });
  if(btn.dataset.n!==correctName)btn.classList.add('wrong');
  $('gscore').textContent=gScore+(btn.dataset.n===correctName?1:0);
  if(btn.dataset.n===correctName)gScore++;
  $('gtotal').textContent=gTotal;
  $('gnext').style.display='inline-block';
 };});
}
$('gnext').onclick=guessRound;guessRound();

/* TRUMPS */
var tWin=0,tLose=0;
var STATS=[
 ['len','Length','cm'],
 ['depth','Max depth','m'],
 ['speed','Speed','km/h'],
 ['life','Lifespan','yrs'],
 ['eggs','Eggs / season',''],
 ['camo','Camouflage','/10']
];
function fmtVal(s,v){
 if(s==='eggs')return v>=1000?(v/1000).toFixed(0)+'k':String(v);
 if(s==='speed')return v<1?v.toFixed(2):String(v);
 return String(v);
}
function cardHtml(key,who,hide,lenLocked){var c=CR[key];
 return '<p class="cap">'+who+'</p><p class="tt">'+c.n+'</p>'+
  '<div style="margin-bottom:8px">'+ART_html(key,160)+'</div>'+
  STATS.map(function(s){
   var lk=(s[0]==='len'&&lenLocked);
   if(hide)return '<div class="statrow"><span>'+s[1]+'</span><span style="color:var(--muted)">—</span></div>';
   var lbl=s[1]+(lk?' <span class="note">too lopsided</span>':'');
   var val=fmtVal(s[0],c[s[0]])+(s[2]?' '+s[2]:'');
   return '<button class="statbtn'+(lk?' locked':'')+'" data-s="'+s[0]+'"'+(lk?' disabled':'')+'>'+
    '<span>'+lbl+'</span><span style="font-weight:600">'+val+'</span></button>';
  }).join('');}
function deal(){
 $('tresult').textContent='';$('tdeal').style.display='none';
 var two=shuffle(KEYS).slice(0,2);var pk=two[0],ck=two[1];
 var lenLocked=Math.max(CR[pk].len,CR[ck].len)/Math.min(CR[pk].len,CR[ck].len)>2;
 $('pcard').innerHTML=cardHtml(pk,'Your card',false,lenLocked);
 $('ccard').innerHTML=cardHtml(ck,'Reef’s card',true,lenLocked);
 $('pcard').querySelectorAll('.statbtn:not(:disabled)').forEach(function(b){b.onclick=function(){
  var s=b.dataset.s;
  $('ccard').innerHTML=cardHtml(ck,'Reef’s card',false,lenLocked);
  $('pcard').querySelectorAll('.statbtn').forEach(function(x){x.disabled=true;});
  $('ccard').querySelectorAll('.statbtn').forEach(function(x){x.disabled=true;if(x.dataset.s===s)x.style.borderColor='var(--accent)';});
  b.style.borderColor='var(--accent)';
  var pv=CR[pk][s],cv=CR[ck][s];
  if(pv>cv){tWin++;$('tresult').textContent='You win the round! 🎉';$('tresult').style.color='var(--good)';}
  else if(pv<cv){tLose++;$('tresult').textContent='The reef takes it.';$('tresult').style.color='var(--bad)';}
  else{$('tresult').textContent='A tie!';$('tresult').style.color='var(--muted)';}
  $('twin').textContent=tWin;$('tlose').textContent=tLose;$('tdeal').style.display='inline-block';
 };});
}
$('tdeal').onclick=deal;deal();
</script>
</body>
</html>
